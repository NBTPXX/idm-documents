<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IDM Flash Web Wiki</title>
<style>
:root {
  --bg: #16191e; --card: #1e2229; --input: #252a33;
  --border: #2e3440; --text: #d8dee9; --text-muted: #6b7280;
  --accent: #10b981; --danger: #ef4444; --warn: #f59e0b;
  --info: #3b82f6;
  --sidebar-w: 240px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; }
.sidebar { width: var(--sidebar-w); background: var(--card); border-right: 1px solid var(--border); padding: 20px 0; position: fixed; top: 0; left: 0; bottom: 0; overflow-y: auto; }
.sidebar h2 { font-size: 1rem; padding: 0 20px 12px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
.sidebar a { display: block; padding: 8px 20px; color: var(--text-muted); text-decoration: none; font-size: 0.875rem; transition: .15s; }
.sidebar a:hover, .sidebar a.active { color: var(--accent); background: rgba(16,185,129,.1); }
.sidebar .lang { padding: 12px 20px; border-top: 1px solid var(--border); margin-top: 12px; }
.sidebar .lang select { width: 100%; padding: 6px 10px; background: var(--input); color: var(--text); border: 1px solid var(--border); border-radius: 4px; font-size: .8rem; }
.main { margin-left: var(--sidebar-w); padding: 32px 48px; max-width: 860px; flex: 1; }
.main h1 { font-size: 1.75rem; margin-bottom: 8px; }
.main h2 { font-size: 1.3rem; margin: 28px 0 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.main h3 { font-size: 1.1rem; margin: 20px 0 8px; }
.main p { line-height: 1.7; margin: 8px 0; color: var(--text-muted); }
.main ul, .main ol { margin: 8px 0; padding-left: 24px; color: var(--text-muted); line-height: 1.7; }
.main a { color: var(--accent); }
.main code { background: var(--input); padding: 2px 6px; border-radius: 4px; font-size: .85em; }
.main pre { background: var(--input); padding: 14px 18px; border-radius: 6px; overflow-x: auto; margin: 10px 0; border: 1px solid var(--border); }
.main pre code { background: none; padding: 0; font-size: .85em; line-height: 1.6; }
.main table { border-collapse: collapse; width: 100%; margin: 12px 0; }
.main th, .main td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; font-size: .875rem; }
.main th { background: var(--input); font-weight: 600; }
.main td { color: var(--text-muted); }
.main hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
.back-link { display: inline-block; margin-bottom: 16px; color: var(--accent); font-size: .85rem; text-decoration: none; }
.back-link:hover { text-decoration: underline; }
@media (max-width: 768px) {
  body { flex-direction: column; }
  .sidebar { position: relative; width: 100%; border-right: 0; border-bottom: 1px solid var(--border); padding: 12px; }
  .main { margin-left: 0; padding: 20px; }
}
</style>
</head>
<body>
<nav class="sidebar">
  <h2>IDM Flash Wiki</h2>
  <a href="#" data-page="INDEX" class="active">概览</a>
  <a href="#" data-page="INSTALL">安装指南</a>
  <a href="#" data-page="CAN_FLASH">CAN 模式刷写</a>
  <a href="#" data-page="USB_FLASH">USB 模式刷写</a>
  <a href="#" data-page="DFU_FLASH">DFU 模式刷写</a>
  <a href="#" data-page="BOOTLOADER">Bootloader 管理</a>
  <a href="#" data-page="MOONRAKER">Moonraker 集成</a>
  <div class="lang">
    <select id="lang-select" onchange="changeLang(this.value)">
      <option value="zh">中文</option>
      <option value="en">English</option>
      <option value="ru">Русский</option>
      <option value="ja">日本語</option>
    </select>
  </div>
</nav>
<main class="main" id="content">
  <a class="back-link" href="/">← 返回刷写工具</a>
  <div id="wiki-body">加载中...</div>
</main>
<script>
let currentLang = localStorage.getItem("wiki-lang") || "zh";
let currentPage = "INDEX";
const langSelect = document.getElementById("lang-select");
langSelect.value = currentLang;

function changeLang(lang) {
  currentLang = lang;
  localStorage.setItem("wiki-lang", lang);
  loadPage(currentPage);
}

document.querySelectorAll(".sidebar a[data-page]").forEach(a => {
  a.addEventListener("click", e => {
    e.preventDefault();
    currentPage = a.dataset.page;
    document.querySelectorAll(".sidebar a[data-page]").forEach(x => x.classList.remove("active"));
    a.classList.add("active");
    loadPage(currentPage);
  });
});

async function loadPage(page) {
  const body = document.getElementById("wiki-body");
  body.innerHTML = "<p>加载中...</p>";
  try {
    const r = await fetch("/wiki/" + currentLang + "/" + page + ".md");
    if (!r.ok) throw new Error("404");
    const md = await r.text();
    body.innerHTML = renderMD(md);
  } catch (e) {
    body.innerHTML = "<p>页面未找到。该语言版本可能尚未翻译。</p>";
  }
}

function renderMD(md) {
  let html = "";
  let inCode = false, codeBuf = "", codeLang = "";
  let inTable = false, tableHtml = "";
  let inList = false, listType = "", listBuf = "";

  const lines = md.split("\n");
  const flushList = () => {
    if (inList && listBuf) {
      html += inList === "ol" ? "<ol>" + listBuf + "</ol>" : "<ul>" + listBuf + "</ul>";
      listBuf = "";
      inList = false;
    }
  };

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];

    if (line.startsWith("```")) {
      if (!inCode) {
        flushList();
        codeLang = line.slice(3).trim();
        inCode = true;
        codeBuf = "";
      } else {
        html += "<pre><code>" + esc(codeBuf) + "</code></pre>";
        inCode = false;
      }
      continue;
    }

    if (inCode) { codeBuf += (codeBuf ? "\n" : "") + line; continue; }

    if (line.startsWith("|") && line.includes("|") && line.trim().endsWith("|")) {
      flushList();
      const cells = line.split("|").filter(c => c.trim()).map(c => c.trim());
      if (cells.every(c => /^[-: ]+$/.test(c))) { inTable = true; continue; }
      const tag = inTable ? "td" : "th";
      tableHtml += "<tr>" + cells.map(c => "<" + tag + ">" + inlineMD(c) + "</" + tag + ">").join("") + "</tr>";
      if (inTable) { inTable = false; html += "<table>" + tableHtml + "</table>"; tableHtml = ""; }
      continue;
    }

    if (inTable) { inTable = false; }

    if (/^#{1,6} /.test(line)) {
      flushList();
      const m = line.match(/^(#{1,6}) (.*)/);
      const lv = m[1].length;
      html += "<h" + lv + ">" + inlineMD(m[2]) + "</h" + lv + ">";
      continue;
    }

    if (/^[\-*] /.test(line)) {
      if (!inList || listType !== "ul") { flushList(); inList = true; listType = "ul"; }
      listBuf += "<li>" + inlineMD(line.slice(2)) + "</li>";
      continue;
    }

    if (/^\d+\. /.test(line)) {
      if (!inList || listType !== "ol") { flushList(); inList = true; listType = "ol"; }
      listBuf += "<li>" + inlineMD(line.replace(/^\d+\. /, "")) + "</li>";
      continue;
    }

    if (line.trim() === "") { flushList(); continue; }
    if (line === "---") { flushList(); html += "<hr>"; continue; }

    flushList();
    html += "<p>" + inlineMD(line) + "</p>";
  }

  flushList();
  if (inCode) html += "<pre><code>" + esc(codeBuf) + "</code></pre>";
  return html;
}

function inlineMD(text) {
  return text
    .replace(/`([^`]+)`/g, "<code>$1</code>")
    .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
    .replace(/\*([^*]+)\*/g, "<em>$1</em>")
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_,t,u) => {
      if (u.endsWith(".md")) {
        const page = u.replace(".md","");
        return '<a href="#" onclick="navigateTo(\'' + page + '\');return false">' + t + '</a>';
      }
      return '<a href="' + u + '" target="_blank">' + t + '</a>';
    });
}

function navigateTo(page) {
  currentPage = page;
  document.querySelectorAll(".sidebar a[data-page]").forEach(x => x.classList.remove("active"));
  const link = document.querySelector('.sidebar a[data-page="' + page + '"]');
  if (link) link.classList.add("active");
  loadPage(page);
}

function esc(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

loadPage(currentPage);
</script>
</body>
</html>
