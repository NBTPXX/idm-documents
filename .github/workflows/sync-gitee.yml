name: Sync from Gitee

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master

      - name: Sync from Gitee
        env:
          GIT_TERMINAL_PROMPT: 0
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          git config --global credential.helper '!f() { echo ""; }; f'
          git remote add gitee https://gitee.com/NBTP/idm-documents.git
          git fetch gitee master
          git checkout -B master gitee/master
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" master --force
